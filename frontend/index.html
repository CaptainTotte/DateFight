<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DateFight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #13141A;
      --bg-card: #1a1b22;
      --bg-elev: #20212a;
      --text: #F0EEE8;
      --muted: #8b8d98;
      --accent: #C9A84C;
      --accent-soft: rgba(201, 168, 76, 0.12);
      --border: #2a2b33;
      --green: #34d17f;
      --green-soft: rgba(52, 209, 127, 0.14);
      --red: #ff6b6b;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .brand img {
      height: 150px;
      width: auto;
      display: block;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    h2 { font-size: 18px; font-weight: 700; }
    .muted { color: var(--muted); }
    .center { text-align: center; }

    /* Landing / code input */
    .landing { max-width: 420px; margin: 40px auto 0; }
    .icon-badge {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center; margin: 0 auto 18px;
      font-size: 26px;
    }
    label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--muted); margin-bottom: 8px;
    }
    input.text, input.code, textarea {
      width: 100%;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea { resize: none; min-height: 70px; overflow: hidden; }
    input.text:focus, input.code:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input.code {
      text-align: center;
      font-family: 'SFMono-Regular', ui-monospace, Menlo, monospace;
      font-size: 36px;
      letter-spacing: 0.6em;
      text-indent: 0.6em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 13px 20px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: filter .15s, transform .05s;
      width: 100%;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.sm { width: auto; padding: 9px 14px; font-size: 13px; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn.danger { background: transparent; border: 1px solid var(--border); color: var(--red); }
    .btn.danger:hover { background: rgba(255,107,107,0.1); filter: none; }

    .field { margin-bottom: 18px; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }

    .err {
      color: #ff6b6b; font-size: 14px; text-align: center;
      margin-top: 14px; min-height: 18px;
    }

    .help { text-align: center; margin-top: 22px; }
    .help a { color: var(--accent); text-decoration: none; font-size: 14px; }

    /* Vote calendar */
    .cal-nav-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px;
    }
    .cal-nav-btn {
      width: 34px; height: 34px; border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text); border-radius: 9px; cursor: pointer; font-size: 18px;
      display: grid; place-items: center; transition: border-color .15s, color .15s;
    }
    .cal-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .cal-nav-btn:disabled { opacity: .3; cursor: default; }
    .cal-nav-title { font-size: 16px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-dow {
      text-align: center; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .04em; padding-bottom: 6px;
    }
    .cal-d {
      aspect-ratio: 1 / 1; display: grid; place-items: center;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      position: relative; transition: transform .08s;
    }
    .cal-d.empty { }
    .cal-d.inactive { color: #3c3d47; }
    .cal-d.event-date {
      background: rgba(52, 209, 127, 0.13);
      color: var(--green); font-weight: 700;
      border: 1px solid rgba(52, 209, 127, 0.25);
      cursor: pointer;
    }
    .cal-d.event-date:hover { background: rgba(52, 209, 127, 0.25); transform: scale(1.08); }
    .cal-d.event-date.selected {
      background: var(--green); color: #13141A;
      border-color: var(--green); box-shadow: 0 0 14px rgba(52, 209, 127, 0.4);
    }
    .cal-d.event-date.selected::after {
      content: '✓'; position: absolute; top: 2px; right: 4px; font-size: 9px; font-weight: 800;
    }
    .cal-legend {
      display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--muted);
    }
    .cal-legend span { display: flex; align-items: center; gap: 6px; }
    .cal-legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .cal-legend .dot-g { background: var(--green); }
    .cal-legend .dot-m { background: #3c3d47; }

    /* Drag-select calendar picker */
    .cal {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; user-select: none; touch-action: none;
    }
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title { font-weight: 700; font-size: 15px; }
    .cal-nav {
      width: 34px; height: 34px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text); border-radius: 9px;
      cursor: pointer; font-size: 16px; display: grid; place-items: center;
    }
    .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
    .cal-day {
      aspect-ratio: 1 / 1; display: grid; place-items: center;
      border-radius: 9px; font-size: 14px; cursor: pointer;
      border: 1px solid transparent;
      transition: background .1s, border-color .1s, color .1s;
    }
    .cal-day:hover { background: var(--accent-soft); }
    .cal-day.muted-day { color: #4a4b55; cursor: default; }
    .cal-day.muted-day:hover { background: transparent; }
    .cal-day.today { border-color: var(--border); }
    .cal-day.selected { background: var(--accent); color: #fff; font-weight: 700; border-color: var(--accent); }
    .cal-day.selected:hover { background: var(--accent); }
    .cal-hint { font-size: 12px; color: var(--muted); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .link-btn {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-family: inherit; font-size: 14px; padding: 0;
    }

    /* Code boxes */
    .code-box {
      background: var(--accent-soft); border: 1px solid var(--accent);
      border-radius: 12px; padding: 22px; text-align: center; margin-top: 12px;
    }
    .code-box.admin { background: rgba(52,209,127,0.08); border-color: var(--green); }
    .code-box .lbl { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .code-box .code {
      font-family: 'SFMono-Regular', ui-monospace, Menlo, monospace;
      font-size: 38px; font-weight: 700; letter-spacing: 0.22em;
      margin: 8px 0 14px; color: var(--text);
    }

    .edit-actions { display: flex; gap: 10px; margin-top: 8px; }
    .edit-actions .btn { width: auto; flex: 1; }

    /* Results bars */
    .bar-row { margin-bottom: 10px; }
    .bar-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 2px; font-size: 14px;
    }
    .bar-head .lbl { font-weight: 600; }
    .bar-head .cnt { color: var(--muted); font-size: 13px; }
    .bar-track { height: 22px; background: var(--bg-elev); border-radius: 8px; overflow: hidden; }
    .bar-fill {
      height: 100%; width: 0;
      background: var(--accent);
      border-radius: 8px;
      transition: width .9s cubic-bezier(.22,.61,.36,1);
      display: flex; align-items: center; padding-left: 12px;
      font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap;
    }
    .bar-row.leader .bar-fill { background: var(--green); }
    .bar-row.leader .lbl::after {
      content: attr(data-leader-label); margin-left: 8px; font-size: 11px;
      color: var(--green); background: var(--green-soft);
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }

    .bars-toggle {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500;
      font-family: inherit; cursor: pointer; margin-top: 8px; width: 100%;
      transition: border-color .15s, color .15s;
    }
    .bars-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .voters { margin-top: 28px; }
    .voter { padding: 14px 0; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .voter .vname { font-weight: 600; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip.picked {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: var(--accent-soft); border: 1px solid var(--accent); color: var(--text);
    }

    .stack > * + * { margin-top: 12px; }
    .mt { margin-top: 24px; }
    .mb { margin-bottom: 24px; }
    .hidden { display: none !important; }
    .desc { color: var(--muted); margin-top: 8px; }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 0;
    }
    #lang-picker { position: fixed; top: 16px; right: 16px; z-index: 200; }
    #lang-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-elev); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: border-color .15s;
    }
    #lang-btn:hover { border-color: var(--accent); }
    #lang-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; min-width: 140px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .lang-opt {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 10px 14px; background: none; border: none; color: var(--text);
      font-family: inherit; font-size: 14px; cursor: pointer; text-align: left;
      transition: background .1s;
    }
    .lang-opt:hover { background: var(--accent-soft); }
    .lang-opt.active { color: var(--accent); font-weight: 600; }
    .lang-opt.active::after { content: '✓'; margin-left: auto; }

    .bottom-nav { display: flex; justify-content: center; margin-top: 24px; }
    #change-event {
      background: var(--accent); color: #13141A;
      border: none; border-radius: 10px;
      padding: 11px 22px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: filter .15s;
    }
    #change-event:hover { filter: brightness(1.1); }

    .footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 48px; }
    .footer a { color: var(--muted); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .results-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .voted-confirm {
      display: flex; align-items: center; gap: 10px;
      background: rgba(52,209,127,0.08); border: 1px solid rgba(52,209,127,0.25);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 14px; color: var(--green);
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-elev); border: 1px solid var(--accent); color: var(--text);
      padding: 12px 20px; border-radius: 10px; font-size: 14px;
      opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 50;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="lang-picker">
    <button id="lang-btn" aria-haspopup="true" aria-expanded="false">
      <span id="lang-flag">🇸🇪</span>
      <span id="lang-name">Svenska</span>
      <span>▾</span>
    </button>
    <div id="lang-menu" class="hidden" role="menu">
      <button class="lang-opt" data-lang="sv" role="menuitem">🇸🇪 Svenska</button>
      <button class="lang-opt" data-lang="en" role="menuitem">🇬🇧 English</button>
    </div>
  </div>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><img src="/img/image.png" alt="DateFight" /></div>
    </div>
    <div id="app"></div>
    <div class="bottom-nav">
      <button class="hidden" id="change-event">← Till start</button>
    </div>
    <div class="footer"><span id="footer-text">© 2026 DateFight · Hitta dagen som funkar för alla</span><br><a href="https://github.com/CaptainTotte/DateFight" target="_blank" rel="noopener">GitHub</a></div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    /* ================================================================
       Translations
    ================================================================ */
    let lang = localStorage.getItem('df_lang') || 'sv';

    const T = {

      },

        resultsTitle: (n) => `Results · ${n} ${n === 1 ? 'vote' : 'votes'}`,
        votesPct:     (n, pct) => `${n} votes · ${pct}%`,
        noVotes:      'No votes yet.',
        whoWhen:      'Who can when?',
        noVoters:     'No one has voted yet.',
        noDates:      'Chose no dates',
        showMore:     (n) => `Show ${n} more ▾`,

        labelDescM:   'Description',
        labelDatesM:  'Dates',
        saveBtn:      'Save changes',
        saving:       'Saving…',
        deleteBtn:    'Delete event',
        confirmDel:   'Delete event and all votes? This cannot be undone.',
        toastSaved:   'Changes saved ✓',
        toastDeleted: 'Event deleted',
        toastNoAuth:  'Unauthorized',
        toastNoSave:  'Could not save',
        toastNoDel:   'Could not delete',
        errTitleM:    'Title is required.',
        errDatesM:    'Pick at least one date.',
        errAuth:      'Unauthorized.',
        errSave:      'Could not save.',
        backBtn:      '← Back to start',
        footer:       '© 2026 DateFight · Find the day that works for everyone',
      },
    };

    function t(key, ...args) {
      const val = T[lang][key];
      return typeof val === 'function' ? val(...args) : (val ?? key);
    }

    /* ================================================================
       App state
    ================================================================ */
    const API = '/api';
    const app = document.getElementById('app');
    const changeBtn = document.getElementById('change-event');
    const footerText = document.getElementById('footer-text');
    const state = { event: null, dates: [], tallies: {}, votes: [], selected: new Set() };
    let calYear = 0, calMonth = 0;
    let adminCode = '';
    let currentView = 'landing';
    let currentJustVoted = false;
    let currentAlreadyVoted = false;

    /* ================================================================
       Language switcher
    ================================================================ */
    function applyLang() {
      document.documentElement.lang = lang;
      document.getElementById('lang-flag').textContent = t('langFlag');
      document.getElementById('lang-name').textContent = t('langName');
      changeBtn.textContent = t('backBtn');
      footerText.textContent = t('footer');
      document.querySelectorAll('.lang-opt').forEach(el =>

    /* ================================================================
       Utilities
    ================================================================ */
    function fmtDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d)) return { dow: '', day: iso, mon: '' };
      return { dow: t('dows')[d.getDay()], day: d.getDate(), mon: t('monthsShort')[d.getMonth()] };
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function ymd(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function autoExpand(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }
    function wireTextareas(root) {
      (root || document).querySelectorAll('textarea').forEach(ta => {
        ta.addEventListener('input', () => autoExpand(ta));
        autoExpand(ta);
      });
    }
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1800);
    }
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => toast(t('copied'))).catch(() => {});
    }

    /* ================================================================
       Drag-select calendar picker
    ================================================================ */
    const picker = { view: new Date(), selected: new Set(), dragging: false, mode: 'add' };
    document.addEventListener('pointerup', () => { picker.dragging = false; });

    function initPicker(initialDates) {
      picker.selected = new Set(initialDates);
      picker.dragging = false;
      const first = [...picker.selected].sort()[0];
      if (first) {
        const d = new Date(first + 'T00:00:00');
        picker.view = new Date(d.getFullYear(), d.getMonth(), 1);
      } else {
        picker.view = new Date(); picker.view.setDate(1);
      }
    }

    function applyPickerCell(el) {
      if (!el || !el.dataset.date) return;
      const date = el.dataset.date;
      if (picker.mode === 'add') { picker.selected.add(date); el.classList.add('selected'); }
      else { picker.selected.delete(date); el.classList.remove('selected'); }
      const c = document.getElementById('picker-count');
      if (c) c.textContent = t('calCount', picker.selected.size);
    }

    function renderPicker() {
      const el = document.getElementById('picker-cal');
      if (!el) return;
      const year = picker.view.getFullYear(), month = picker.view.getMonth();
      const todayStr = ymd(new Date());
      const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let cells = t('dowsHdr').map(d => `<div class="cal-dow">${d}</div>`).join('');
      for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day muted-day"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const cls = ['cal-day'];
        if (picker.selected.has(ds)) cls.push('selected');
        if (ds === todayStr) cls.push('today');
        cells += `<div class="${cls.join(' ')}" data-date="${ds}">${day}</div>`;
      }

      el.innerHTML = `
        <div class="cal-head">
          <button class="cal-nav" data-nav="-1" type="button">‹</button>
          <div class="cal-title">${t('months')[month]} ${year}</div>
          <button class="cal-nav" data-nav="1" type="button">›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-hint">
          <span id="picker-count">${t('calCount', picker.selected.size)}</span>
          <button class="link-btn" id="picker-clear" type="button">${t('calClear')}</button>
        </div>`;

      el.querySelectorAll('[data-nav]').forEach(btn =>
        btn.addEventListener('click', () => {
          picker.view = new Date(year, month + Number(btn.dataset.nav), 1);
          renderPicker();
        }));
      el.querySelector('#picker-clear').addEventListener('click', () => {
        picker.selected.clear(); renderPicker();
      });

      const grid = el.querySelector('.cal-grid');
      grid.addEventListener('pointerdown', e => {
        const cell = e.target.closest('.cal-day');
        if (!cell || !cell.dataset.date) return;
        e.preventDefault();
        picker.dragging = true;
        picker.mode = picker.selected.has(cell.dataset.date) ? 'remove' : 'add';
        applyPickerCell(cell);
      });
      grid.addEventListener('pointermove', e => {
        if (!picker.dragging) return;
        const cell = document.elementFromPoint(e.clientX, e.clientY);
        const day = cell && cell.closest ? cell.closest('.cal-day') : null;
        if (day && day.dataset.date) applyPickerCell(day);
      });
    }

    /* ================================================================

    ================================================================ */
    function loadEvent(data) {
      state.event = data.event;
      state.dates = data.dates;
      state.tallies = data.tallies;
      state.votes = data.votes;
      state.selected = new Set();
      const sorted = [...data.dates].sort((a, b) => a.date.localeCompare(b.date));
      if (sorted.length) {
        const d = new Date(sorted[0].date + 'T00:00:00');
        calYear = d.getFullYear(); calMonth = d.getMonth();
      }
      renderPage(false, hasVoted(data.event.code));
    }

    /* ================================================================
       Vote calendar (single-month)
    ================================================================ */
    function renderCalView() {
      const container = document.getElementById('cal-view');
      if (!container || !state.dates.length) return;

      const eventMap = {};
      state.dates.forEach(d => { eventMap[d.date] = d.id; });

      const year = calYear, month = calMonth;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;

      const curKey = year * 12 + month;
      let hasEarlier = false, hasLater = false;
      state.dates.forEach(d => {
        const dd = new Date(d.date + 'T00:00:00');
        const k = dd.getFullYear() * 12 + dd.getMonth();
        if (k < curKey) hasEarlier = true;
        if (k > curKey) hasLater = true;
      });

      let cells = t('dowsHdr').map(d => `<div class="cal-dow">${d}</div>`).join('');
      for (let i = 0; i < startOffset; i++) cells += `<div class="cal-d empty"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const eventId = eventMap[ds];
        if (eventId != null) {
          const sel = state.selected.has(eventId);
          cells += `<div class="cal-d event-date${sel?' selected':''}" data-id="${eventId}">${day}</div>`;
        } else {
          cells += `<div class="cal-d inactive">${day}</div>`;
        }
      }

      container.innerHTML = `
        <div class="cal-nav-row">
          <button class="cal-nav-btn" id="cal-prev" ${hasEarlier ? '' : 'disabled'}>‹</button>
          <span class="cal-nav-title">${t('months')[month]} ${year}</span>
          <button class="cal-nav-btn" id="cal-next" ${hasLater ? '' : 'disabled'}>›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-legend">
          <span><i class="dot-g"></i> ${t('legendAvail')}</span>
          <span><i class="dot-m"></i> ${t('legendNa')}</span>
        </div>`;

      document.getElementById('cal-prev').addEventListener('click', () => changeMonth(-1));
      document.getElementById('cal-next').addEventListener('click', () => changeMonth(1));

      container.querySelectorAll('.event-date').forEach(cell => {
        cell.addEventListener('click', () => {
          const id = Number(cell.dataset.id);
          if (state.selected.has(id)) { state.selected.delete(id); cell.classList.remove('selected'); }
          else { state.selected.add(id); cell.classList.add('selected'); }
        });
      });
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0)  { calMonth = 11; calYear--; }
      renderCalView();
    }

    /* ================================================================
       Results (shared)
    ================================================================ */
    function buildResultsHTML() {
      const total = state.votes.length;
      const max = Math.max(0, ...Object.values(state.tallies));
      const uniqueCounts = new Set(Object.values(state.tallies).filter(c => c > 0));
      const hasRealLeader = uniqueCounts.size > 1;

      const BARS_LIMIT = 5;
      const sortedDates = [...state.dates].sort((a, b) => (state.tallies[b.id] || 0) - (state.tallies[a.id] || 0));
      const barItems = sortedDates.map(d => {
        const count = state.tallies[d.id] || 0;
        if (count === 0) return '';
        const pct = total ? Math.round((count / total) * 100) : 0;
        const leader = hasRealLeader && count === max;
        const f = fmtDate(d.date);
        return `
          <div class="bar-row ${leader ? 'leader' : ''}">
            <div class="bar-head">
              <span class="lbl" ${leader ? `data-leader-label="${esc(t('leder'))}"` : ''}>${f.dow} ${f.day} ${esc(f.mon)}</span>
              <span class="cnt">${t('votesPct', count, pct)}</span>
            </div>
            <div class="bar-track"><div class="bar-fill" data-pct="${pct}">${pct > 12 ? pct + '%' : ''}</div></div>
          </div>`;
      }).filter(Boolean);
      const hiddenCount = Math.max(0, barItems.length - BARS_LIMIT);
      const bars = barItems.length === 0 ? '' :
        barItems.slice(0, BARS_LIMIT).join('') +
        (hiddenCount > 0 ? `<div class="bars-overflow hidden" id="bars-overflow">${barItems.slice(BARS_LIMIT).join('')}</div>
          <button class="bars-toggle" id="bars-toggle">${t('showMore', hiddenCount)}</button>` : '');

      const voters = state.votes.map(v => {
        const picked = new Set(v.date_ids);
        const pickedDates = state.dates.filter(d => picked.has(d.id));
        const chips = pickedDates.map(d => {
          const f = fmtDate(d.date);
          return `<span class="chip picked">${f.dow} ${f.day} ${esc(f.mon)}</span>`;
        }).join('');
        const label = pickedDates.length === 0
          ? `<span class="muted" style="font-size:13px">${t('noDates')}</span>`
          : chips;
        return `
          <div class="voter">
            <span class="vname">${esc(v.first_name)} ${esc(v.last_name)}</span>
            <div class="chips">${label}</div>
          </div>`;
      }).join('');

      const html = `
        <div class="results-title">${t('resultsTitle', total)}</div>
        <div id="bars">${bars || `<p class="muted">${t('noVotes')}</p>`}</div>
        <div class="voters">
          <h2 class="mb" style="margin-top:24px">${t('whoWhen')}</h2>
          ${voters || `<p class="muted">${t('noVoters')}</p>`}
        </div>`;
      return { html, hiddenCount };
    }

    function wireResults(hiddenCount) {
      const barsToggle = document.getElementById('bars-toggle');
      if (barsToggle) {
        barsToggle.addEventListener('click', () => {
          const overflow = document.getElementById('bars-overflow');
          const open = overflow.classList.toggle('hidden') === false;
          barsToggle.textContent = open ? t('showLess') : t('showMore', hiddenCount);
          if (open) requestAnimationFrame(() => {
            overflow.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; });
          });
        });
      }
      requestAnimationFrame(() => {
        app.querySelectorAll('.bar-fill:not(#bars-overflow .bar-fill)').forEach(b => { b.style.width = b.dataset.pct + '%'; });
      });
    }

    async function submitVote() {
      const first = document.getElementById('first').value.trim();
      const last = document.getElementById('last').value.trim();
      const err = document.getElementById('err');
      err.textContent = '';
      if (!first || !last) { err.textContent = t('errNames'); return; }
      if (state.selected.size === 0) { err.textContent = t('errPickDay'); return; }

      const btn = document.getElementById('submit');
      btn.disabled = true; btn.textContent = t('submitting');
      try {
        const r = await fetch(`${API}/votes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id: state.event.id,
            first_name: first,
            last_name: last,
            date_ids: [...state.selected],
          }),
        });
        if (r.status === 409) {
          markVoted(state.event.code);
          const fresh = await (await fetch(`${API}/events/by-code/${state.event.code}`)).json();
          state.tallies = fresh.tallies; state.votes = fresh.votes; state.dates = fresh.dates;
          renderPage(false, true);
          return;
        }
        if (!r.ok) throw new Error();
        markVoted(state.event.code);
        const fresh = await (await fetch(`${API}/events/by-code/${state.event.code}`)).json();
        state.tallies = fresh.tallies; state.votes = fresh.votes; state.dates = fresh.dates;
        state.selected = new Set();
        renderPage(true);
      } catch {
        err.textContent = t('errSubmit');
        btn.disabled = false; btn.textContent = t('submitBtn');
      }
    }

    async function saveManage() {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const dates = [...picker.selected].sort();
      const err = document.getElementById('err');
      err.textContent = '';
      if (!title) { err.textContent = t('errTitleM'); return; }
      if (dates.length === 0) { err.textContent = t('errDatesM'); return; }

      const btn = document.getElementById('save');
      btn.disabled = true; btn.textContent = t('saving');
      try {
        const r = await fetch(`${API}/events/${state.event.id}`, {
          method: 'PATCH',
          headers: adminHeaders(),
          body: JSON.stringify({ title, description, dates }),
        });
        if (r.status === 401) { err.textContent = t('errAuth'); btn.disabled = false; btn.textContent = t('saveBtn'); return; }
        if (!r.ok) throw new Error();
        toast(t('toastSaved'));
        const fresh = await (await fetch(`${API}/events/resolve/${adminCode}`)).json();
        renderManage(fresh);
      } catch {
        err.textContent = t('errSave');
        btn.disabled = false; btn.textContent = t('saveBtn');
      }
    }

    async function deleteManage() {
      if (!confirm(t('confirmDel'))) return;
      try {
        const r = await fetch(`${API}/events/${state.event.id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminCode },
        });
        if (r.status === 401) { toast(t('toastNoAuth')); return; }
        if (!r.ok) throw new Error();
        toast(t('toastDeleted'));
        location.hash = '';
        renderLanding();
      } catch { toast(t('toastNoDel')); }
    }

    /* ================================================================
       Router
    ================================================================ */
    async function route() {
      const raw = location.hash.replace('#', '').trim();
      if (raw.toLowerCase() === 'new') { renderCreate(); return; }
      const code = raw.toUpperCase();
      if (code && /^[A-Z0-9]{4}$/.test(code)) {
        try {
          const r = await fetch(`${API}/events/resolve/${code}`);
          if (r.ok) {
            const data = await r.json();
            if (data.mode === 'admin') renderManage(data);
            else loadEvent(data);
            return;
          }
        } catch {}
      }
      renderLanding();
    }

    window.addEventListener('hashchange', route);
    route();
  </script>
</body>
</html>
