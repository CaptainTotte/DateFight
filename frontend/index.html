<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DateFight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #13141A;
      --bg-card: #1a1b22;
      --bg-elev: #20212a;
      --text: #F0EEE8;
      --muted: #8b8d98;
      --accent: #C9A84C;
      --accent-soft: rgba(201, 168, 76, 0.12);
      --border: #2a2b33;
      --green: #34d17f;
      --green-soft: rgba(52, 209, 127, 0.14);
      --red: #ff6b6b;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .brand img {
      height: 150px;
      width: auto;
      display: block;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    h2 { font-size: 18px; font-weight: 700; }
    .muted { color: var(--muted); }
    .center { text-align: center; }

    /* Landing / code input */
    .landing { max-width: 420px; margin: 40px auto 0; }
    .icon-badge {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center; margin: 0 auto 18px;
      font-size: 26px;
    }
    label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--muted); margin-bottom: 8px;
    }
    input.text, input.code, textarea {
      width: 100%;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea { resize: none; min-height: 70px; overflow: hidden; }
    input.text:focus, input.code:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input.code {
      text-align: center;
      font-family: 'SFMono-Regular', ui-monospace, Menlo, monospace;
      font-size: 36px;
      letter-spacing: 0.6em;
      text-indent: 0.6em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 13px 20px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: filter .15s, transform .05s;
      width: 100%;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }
    .btn-outline {
      background: none; border: 1px solid var(--accent); color: var(--accent);
      border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .15s;
      white-space: nowrap;
    }
    .btn-outline:hover { background: var(--accent-soft); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.sm { width: auto; padding: 9px 14px; font-size: 13px; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn.danger { background: transparent; border: 1px solid var(--border); color: var(--red); }
    .btn.danger:hover { background: rgba(255,107,107,0.1); filter: none; }

    .field { margin-bottom: 18px; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }

    .err {
      color: #ff6b6b; font-size: 14px; text-align: center;
      margin-top: 14px; min-height: 18px;
    }

    .help { text-align: center; margin-top: 22px; }
    .help a { color: var(--accent); text-decoration: none; font-size: 14px; }

    /* Vote calendar */
    .cal-nav-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px;
    }
    .cal-nav-btn {
      width: 34px; height: 34px; border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text); border-radius: 9px; cursor: pointer; font-size: 18px;
      display: grid; place-items: center; transition: border-color .15s, color .15s;
    }
    .cal-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .cal-nav-btn:disabled { opacity: .3; cursor: default; }
    .cal-nav-title { font-size: 16px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-dow {
      text-align: center; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .04em; padding-bottom: 6px;
    }
    .cal-d {
      aspect-ratio: 1 / 1; display: grid; place-items: center;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      position: relative; transition: transform .08s;
    }
    .cal-d.empty { }
    .cal-d.inactive { color: #3c3d47; }
    .cal-d.event-date {
      background: rgba(52, 209, 127, 0.13);
      color: var(--green); font-weight: 700;
      border: 1px solid rgba(52, 209, 127, 0.25);
      cursor: pointer;
    }
    .cal-d.event-date:hover { background: rgba(52, 209, 127, 0.25); transform: scale(1.08); }
    .cal-d.event-date.selected {
      background: var(--green); color: #13141A;
      border-color: var(--green); box-shadow: 0 0 14px rgba(52, 209, 127, 0.4);
    }
    .cal-d.event-date.selected::after {
      content: '✓'; position: absolute; top: 2px; right: 4px; font-size: 9px; font-weight: 800;
    }
    .cal-legend {
      display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--muted);
    }
    .cal-legend span { display: flex; align-items: center; gap: 6px; }
    .cal-legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .cal-legend .dot-g { background: var(--green); }
    .cal-legend .dot-m { background: #3c3d47; }

    /* Drag-select calendar picker */
    .cal {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; user-select: none; touch-action: none;
    }
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title { font-weight: 700; font-size: 15px; }
    .cal-nav {
      width: 34px; height: 34px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text); border-radius: 9px;
      cursor: pointer; font-size: 16px; display: grid; place-items: center;
    }
    .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
    .cal-day {
      aspect-ratio: 1 / 1; display: grid; place-items: center;
      border-radius: 9px; font-size: 14px; cursor: pointer;
      border: 1px solid transparent;
      transition: background .1s, border-color .1s, color .1s;
    }
    .cal-day:hover { background: var(--accent-soft); }
    .cal-day.muted-day { color: #4a4b55; cursor: default; }
    .cal-day.muted-day:hover { background: transparent; }
    .cal-day.today { border-color: var(--border); }
    .cal-day.selected { background: var(--green); color: #fff; font-weight: 700; border-color: var(--green); }
    .cal-day.selected:hover { background: var(--green); }
    .cal-hint { font-size: 12px; color: var(--muted); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .link-btn {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-family: inherit; font-size: 14px; padding: 0;
    }

    /* Code boxes */
    .code-box {
      background: var(--accent-soft); border: 1px solid var(--accent);
      border-radius: 12px; padding: 22px; text-align: center; margin-top: 12px;
    }
    .code-box.admin { background: rgba(52,209,127,0.08); border-color: var(--green); }
    .code-box .lbl { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .code-box .code {
      font-family: 'SFMono-Regular', ui-monospace, Menlo, monospace;
      font-size: 38px; font-weight: 700; letter-spacing: 0.22em;
      margin: 8px 0 14px; color: var(--text);
    }

    .edit-actions { display: flex; gap: 10px; margin-top: 8px; }
    .edit-actions .btn { width: auto; flex: 1; }

    /* Results list */
    .top-dates { margin-bottom: 28px; }

    /* Score groups */
    .date-group.leader .td-bar-fill { background: var(--green); }
    .date-group:not(:first-child) { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 4px; }

    /* Date items */
    .date-item { border-top: none; padding: 8px 0; }
    .date-group .date-item + .date-item { border-top: 1px solid var(--border); }
    .date-item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .medal { font-size: 16px; line-height: 1; }
    .td-name { font-weight: 600; font-size: 14px; flex: 1; }
    .td-score-inline { font-size: 13px; color: var(--muted); }
    .name-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .name-chip { border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 12px; color: var(--text); }

    /* Bar */
    .td-bar-track { height: 10px; background: var(--bg-elev); border-radius: 5px; overflow: hidden; }
    .td-bar-fill {
      height: 100%; width: 0; border-radius: 5px;
      background: var(--accent);
      transition: width .9s cubic-bezier(.22,.61,.36,1);
    }
    .bars-toggle {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 12px;
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: border-color .15s, color .15s;
    }
    .bars-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .bars-toggle:focus { outline: none; }
    .bars-toggle:focus-visible { outline: 2px solid var(--accent); }

    .stat-chips { display: flex; gap: 10px; justify-content: center; margin: 16px 0 20px; }
    .stat-chip {
      flex: 1; max-width: 150px;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; text-align: center;
    }
    .stat-chip.active-chip { background: var(--accent-soft); border-color: var(--accent); }
    .stat-chip.settled-chip { background: var(--green-soft); border-color: var(--green); }
    .stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
    .active-chip .stat-num { color: var(--accent); }
    .settled-chip .stat-num { color: var(--green); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.3; }

    .preset-row { display: flex; gap: 8px; }
    .preset-btn {
      flex: 1; padding: 8px; font-size: 13px; font-weight: 600; font-family: inherit;
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); cursor: pointer; transition: background .15s, border-color .15s, color .15s;
    }
    .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .closes-badge {
      display: inline-block; font-size: 12px; color: var(--muted);
      margin-top: 4px;
    }

    .stack > * + * { margin-top: 12px; }
    .mt { margin-top: 24px; }
    .mb { margin-bottom: 24px; }
    .hidden { display: none !important; }
    .desc { color: var(--muted); margin-top: 8px; }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 0;
    }
    #lang-picker { position: fixed; top: 16px; right: 16px; z-index: 200; }
    #lang-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-elev); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: border-color .15s;
    }
    #lang-btn:hover { border-color: var(--accent); }
    #lang-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; min-width: 140px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .lang-opt {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 10px 14px; background: none; border: none; color: var(--text);
      font-family: inherit; font-size: 14px; cursor: pointer; text-align: left;
      transition: background .1s;
    }
    .lang-opt:hover { background: var(--accent-soft); }
    .lang-opt.active { color: var(--accent); font-weight: 600; }
    .lang-opt.active::after { content: '✓'; margin-left: auto; }

    .bottom-nav { display: flex; justify-content: center; margin-top: 24px; }
    #change-event {
      background: var(--accent); color: #13141A;
      border: none; border-radius: 10px;
      padding: 11px 22px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: filter .15s;
    }
    #change-event:hover { filter: brightness(1.1); }

    .footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 48px; }
    .footer a { color: var(--muted); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .results-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .voted-confirm {
      display: flex; align-items: center; gap: 10px;
      background: rgba(52,209,127,0.08); border: 1px solid rgba(52,209,127,0.25);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 14px; color: var(--green);
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-elev); border: 1px solid var(--accent); color: var(--text);
      padding: 12px 20px; border-radius: 10px; font-size: 14px;
      opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 50;
    }
    .toast.show { opacity: 1; }
    .help-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .help-modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; max-width: 480px; width: 100%;
      position: relative; max-height: 90vh; overflow-y: auto;
    }
    .help-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; line-height: 1;
    }
    .help-close:hover { color: var(--text); }
    .confirm-modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 24px; max-width: 360px; width: 100%;
    }
    .confirm-modal p { font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions .btn { flex: 1; }

    .help-step { display: flex; gap: 14px; margin-bottom: 20px; text-align: left; }
    .help-step:last-child { margin-bottom: 0; }
    .help-num {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center; font-size: 13px; font-weight: 700;
    }
    .help-step-body h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .help-step-body p { font-size: 14px; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>
  <div id="lang-picker">
    <button id="lang-btn" aria-haspopup="true" aria-expanded="false">
      <span id="lang-flag">🇸🇪</span>
      <span id="lang-name">Svenska</span>
      <span>▾</span>

    <div id="lang-menu" class="hidden" role="menu"></div>
  </div>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><img src="/img/image.png" alt="DateFight" /></div>

    <div id="app"></div>
    <div class="bottom-nav">
      <button class="hidden" id="change-event">← Till start</button>

  </div>
  <div class="toast" id="toast"></div>
  <div id="confirm-overlay" class="help-overlay hidden" role="dialog" aria-modal="true">
    <div class="confirm-modal">
      <p id="confirm-msg"></p>
      <div class="confirm-actions">
        <button class="btn-outline" id="confirm-cancel"></button>
        <button class="btn danger" id="confirm-ok"></button>
      </div>
    </div>
  </div>
  <div id="help-overlay" class="help-overlay hidden" role="dialog" aria-modal="true">
    <div class="help-modal">
      <button id="help-close" class="help-close" aria-label="Stäng">✕</button>
      <div id="help-content"></div>

    /* ================================================================
       Utilities
    ================================================================ */
    function fmtDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d)) return { dow: '', day: iso, mon: '' };
      return { dow: t('dows')[d.getDay()], day: d.getDate(), mon: t('monthsShort')[d.getMonth()] };
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function ymd(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function autoExpand(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }
    function wireTextareas(root) {
      (root || document).querySelectorAll('textarea').forEach(ta => {
        ta.addEventListener('input', () => autoExpand(ta));
        autoExpand(ta);
      });
    }
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1800);
    }
    function showConfirm(msg, onOk) {
      const overlay = document.getElementById('confirm-overlay');
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('confirm-cancel').textContent = t('cancelBtn');
      document.getElementById('confirm-ok').textContent = t('deleteBtn');
      overlay.classList.remove('hidden');
      const close = () => overlay.classList.add('hidden');
      document.getElementById('confirm-cancel').onclick = close;
      document.getElementById('confirm-ok').onclick = () => { close(); onOk(); };
      overlay.onclick = e => { if (e.target === overlay) close(); };
    }
    function countUp(el, target, duration = 700) {
      const start = Date.now();
      const tick = () => {
        const p = Math.min(1, (Date.now() - start) / duration);
        el.textContent = Math.round(p * target);
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => toast(t('copied'))).catch(() => {});
    }

      async function join() {
        const code = codeInput.value.trim().toUpperCase();
        const err = document.getElementById('err');

    function getVoter(code) {
      try { return JSON.parse(localStorage.getItem('voter_' + code) || 'null'); } catch { return null; }

    async function createEvent(closeDays = 0) {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const dates = [...picker.selected].sort();
      const err = document.getElementById('err');
      err.textContent = '';
      if (!title) { err.textContent = t('errTitle'); return; }
      if (dates.length === 0) { err.textContent = t('errDates'); return; }

      const closes_at = closeDays > 0
        ? new Date(Date.now() + closeDays * 864e5).toISOString()
        : null;

      const btn = document.getElementById('create');
      btn.disabled = true; btn.textContent = t('creating');
      try {
        const r = await fetch(`${API}/events`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, dates, closes_at }),
        });
        if (!r.ok) throw new Error();
        const data = await r.json();
        showCreated(data.code, data.admin_code);
      } catch {
        err.textContent = t('errCreate');
        btn.disabled = false; btn.textContent = t('createSubmit');
      }
    }

    /* ================================================================
       Drag-select calendar picker
    ================================================================ */
    const picker = { view: new Date(), selected: new Set(), dragging: false, mode: 'add' };
    document.addEventListener('pointerup', () => { picker.dragging = false; });

    function initPicker(initialDates) {
      picker.selected = new Set(initialDates);
      picker.dragging = false;
      const first = [...picker.selected].sort()[0];
      if (first) {
        const d = new Date(first + 'T00:00:00');
        picker.view = new Date(d.getFullYear(), d.getMonth(), 1);
      } else {
        picker.view = new Date(); picker.view.setDate(1);
      }
    }

    function applyPickerCell(el) {
      if (!el || !el.dataset.date) return;
      const date = el.dataset.date;
      if (picker.mode === 'add') { picker.selected.add(date); el.classList.add('selected'); }
      else { picker.selected.delete(date); el.classList.remove('selected'); }
      const c = document.getElementById('picker-count');
      if (c) c.textContent = t('calCount', picker.selected.size);
    }

    function renderPicker() {
      const el = document.getElementById('picker-cal');
      if (!el) return;
      const year = picker.view.getFullYear(), month = picker.view.getMonth();
      const todayStr = ymd(new Date());
      const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let cells = t('dowsHdr').map(d => `<div class="cal-dow">${d}</div>`).join('');
      for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day muted-day"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const cls = ['cal-day'];
        if (picker.selected.has(ds)) cls.push('selected');
        if (ds === todayStr) cls.push('today');
        cells += `<div class="${cls.join(' ')}" data-date="${ds}">${day}</div>`;
      }

      el.innerHTML = `
        <div class="cal-head">
          <button class="cal-nav" data-nav="-1" type="button">‹</button>
          <div class="cal-title">${t('months')[month]} ${year}</div>
          <button class="cal-nav" data-nav="1" type="button">›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-hint">
          <span id="picker-count">${t('calCount', picker.selected.size)}</span>
          <button class="link-btn" id="picker-clear" type="button">${t('calClear')}</button>
        </div>`;

      el.querySelectorAll('[data-nav]').forEach(btn =>
        btn.addEventListener('click', () => {
          picker.view = new Date(year, month + Number(btn.dataset.nav), 1);
          renderPicker();
        }));
      el.querySelector('#picker-clear').addEventListener('click', () => {
        picker.selected.clear(); renderPicker();
      });

      const grid = el.querySelector('.cal-grid');
      grid.addEventListener('pointerdown', e => {
        const cell = e.target.closest('.cal-day');
        if (!cell || !cell.dataset.date) return;
        e.preventDefault();
        picker.dragging = true;
        picker.mode = picker.selected.has(cell.dataset.date) ? 'remove' : 'add';
        applyPickerCell(cell);
      });
      grid.addEventListener('pointermove', e => {
        if (!picker.dragging) return;
        const cell = document.elementFromPoint(e.clientX, e.clientY);
        const day = cell && cell.closest ? cell.closest('.cal-day') : null;
        if (day && day.dataset.date) applyPickerCell(day);
      });
    }

    /* ================================================================
       Vote event loader
    ================================================================ */
    function loadEvent(data) {
      state.event = data.event;
      state.dates = data.dates;
      state.tallies = data.tallies;
      state.votes = data.votes;
      state.selected = new Set();
      const sorted = [...data.dates].sort((a, b) => a.date.localeCompare(b.date));
      if (sorted.length) {
        const d = new Date(sorted[0].date + 'T00:00:00');
        calYear = d.getFullYear(); calMonth = d.getMonth();
      }
      renderPage(false, hasVoted(data.event.code));
    }

    /* ================================================================
       Vote calendar (single-month)
    ================================================================ */
    function renderCalView() {
      const container = document.getElementById('cal-view');
      if (!container || !state.dates.length) return;

      const eventMap = {};
      state.dates.forEach(d => { eventMap[d.date] = d.id; });

      const year = calYear, month = calMonth;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;

      const curKey = year * 12 + month;
      let hasEarlier = false, hasLater = false;
      state.dates.forEach(d => {
        const dd = new Date(d.date + 'T00:00:00');
        const k = dd.getFullYear() * 12 + dd.getMonth();
        if (k < curKey) hasEarlier = true;
        if (k > curKey) hasLater = true;
      });

      let cells = t('dowsHdr').map(d => `<div class="cal-dow">${d}</div>`).join('');
      for (let i = 0; i < startOffset; i++) cells += `<div class="cal-d empty"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const eventId = eventMap[ds];
        if (eventId != null) {
          const sel = state.selected.has(eventId);
          cells += `<div class="cal-d event-date${sel?' selected':''}" data-id="${eventId}">${day}</div>`;
        } else {
          cells += `<div class="cal-d inactive">${day}</div>`;
        }
      }

      container.innerHTML = `
        <div class="cal-nav-row">
          <button class="cal-nav-btn" id="cal-prev" ${hasEarlier ? '' : 'disabled'}>‹</button>
          <span class="cal-nav-title">${t('months')[month]} ${year}</span>
          <button class="cal-nav-btn" id="cal-next" ${hasLater ? '' : 'disabled'}>›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-legend">
          <span><i class="dot-g"></i> ${t('legendAvail')}</span>
          <span><i class="dot-m"></i> ${t('legendNa')}</span>
        </div>`;

      document.getElementById('cal-prev').addEventListener('click', () => changeMonth(-1));
      document.getElementById('cal-next').addEventListener('click', () => changeMonth(1));

      container.querySelectorAll('.event-date').forEach(cell => {
        cell.addEventListener('click', () => {
          const id = Number(cell.dataset.id);
          if (state.selected.has(id)) { state.selected.delete(id); cell.classList.remove('selected'); }
          else { state.selected.add(id); cell.classList.add('selected'); }
        });
      });
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0)  { calMonth = 11; calYear--; }
      renderCalView();
    }

    /* ================================================================
       Results (shared)
    ================================================================ */
    function buildResultsHTML() {
      const total = state.votes.length;
      const max = Math.max(0, ...Object.values(state.tallies));
      const hasRealLeader = new Set(Object.values(state.tallies).filter(c => c > 0)).size > 1;

      const sortedDates = [...state.dates]
        .filter(d => (state.tallies[d.id] || 0) > 0)
        .sort((a, b) => (state.tallies[b.id] || 0) - (state.tallies[a.id] || 0));

      // Build score groups
      const groups = [];
      for (const d of sortedDates) {
        const count = state.tallies[d.id] || 0;
        if (!groups.length || groups[groups.length - 1].count !== count) {
          const pct = total ? Math.round((count / total) * 100) : 0;
          groups.push({ rank: groups.length + 1, count, pct, dates: [] });
        }
        groups[groups.length - 1].dates.push(d);
      }

      // Split groups at LIMIT dates (never cut a group in half)
      const LIMIT = 5;
      let seen = 0, splitAt = groups.length;
      for (let i = 0; i < groups.length; i++) {
        if (seen + groups[i].dates.length > LIMIT && i > 0) { splitAt = i; break; }
        seen += groups[i].dates.length;
      }
      const visibleGroups = groups.slice(0, splitAt);
      const hiddenGroups  = groups.slice(splitAt);
      const hiddenCount   = hiddenGroups.reduce((n, g) => n + g.dates.length, 0);

      const renderGroup = (g, isLeader) => {
        const medal = g.rank === 1 ? '🥇' : g.rank === 2 ? '🥈' : g.rank === 3 ? '🥉' : '';
        const datesHTML = g.dates.map(d => {
          const f = fmtDate(d.date);
          const chipsHTML = state.votes
            .filter(v => v.date_ids.includes(d.id))
            .map(v => `<span class="name-chip">${esc(v.first_name)} ${esc(v.last_name)}</span>`)
            .join('');
          return `
            <div class="date-item">
              <div class="date-item-head">
                ${medal ? `<span class="medal">${medal}</span>` : ''}
                <span class="td-name">${f.dow} ${f.day} ${esc(f.mon)}</span>
                <span class="td-score-inline">${g.count}/${total} · ${g.pct}%</span>
              </div>
              <div class="td-bar-track"><div class="td-bar-fill" data-pct="${g.pct}"></div></div>
              ${chipsHTML ? `<div class="name-chips">${chipsHTML}</div>` : ''}
            </div>`;
        }).join('');
        return `<div class="date-group${isLeader ? ' leader' : ''}">${datesHTML}</div>`;
      };

      const visibleHTML = visibleGroups.map((g, i) => renderGroup(g, hasRealLeader && i === 0)).join('');
      const hiddenHTML  = hiddenGroups.map(g => renderGroup(g, false)).join('');
      const overflowBlock = hiddenCount > 0
        ? `<div class="dates-overflow hidden" id="dates-overflow">${hiddenHTML}</div>
           <button class="bars-toggle" id="dates-toggle">${t('showMore', hiddenCount)}</button>`
        : '';

      const listHTML = sortedDates.length === 0
        ? `<p class="muted">${t('noVotes')}</p>`
        : `<div class="top-dates">${visibleHTML}${overflowBlock}</div>`;

      const html = `
        <div class="results-title">${t('resultsTitle', total)}</div>
        <div style="margin-bottom:8px;font-weight:700;font-size:15px">${t('topDates')}</div>
        ${listHTML}`;
      return { html, hiddenCount };
    }

    function wireResults(hiddenCount) {
      requestAnimationFrame(() => {
        document.querySelectorAll('.td-bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; });
      });

      const toggle = document.getElementById('dates-toggle');
      if (toggle) {
        toggle.addEventListener('click', () => {
          const overflow = document.getElementById('dates-overflow');
          const open = overflow.classList.toggle('hidden') === false;
          toggle.textContent = open ? t('showLess') : t('showMore', hiddenCount);
          if (open) requestAnimationFrame(() => {
            overflow.querySelectorAll('.td-bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; });
          });
        });
      }
    }

    /* ================================================================
       Vote + Results page
    ================================================================ */
    let editingVote = false;

    function renderPage(justVoted = false, alreadyVoted = false, editing = false) {
      currentView = 'vote';
      currentJustVoted = justVoted;
      currentAlreadyVoted = alreadyVoted;
      editingVote = editing;
      changeBtn.classList.remove('hidden');
      const results = buildResultsHTML();
      const voter = getVoter(state.event.code);

      const isClosed = state.event.closes_at && new Date(state.event.closes_at) < new Date();

      let deadlineLine = '';
      if (state.event.closes_at && !isClosed) {
        const d = new Date(state.event.closes_at);
        const f = fmtDate(d.toISOString().slice(0, 10));
        const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        deadlineLine = `<span class="closes-badge">${t('closesOn')}: ${f.dow} ${f.day} ${esc(f.mon)}, ${time}</span>`;
      }

      if (editing && voter) {
        state.selected = new Set(voter.dateIds.filter(id =>
          state.dates.some(d => d.id === id)));
      }

      const voteSection = isClosed
        ? `<div class="voted-confirm" style="margin-top:20px">${t('votingClosed')}</div>`
        : (alreadyVoted || justVoted) && !editing ? `
          <div class="voted-confirm" style="margin-top:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <span>${t('alreadyVoted')}</span>
            ${voter ? `<button class="btn-outline" id="change-vote-btn">${t('changeVoteBtn')}</button>` : ''}
          </div>` : `
          <div class="mt mb">
            <h2 style="margin-bottom:14px">${t('voteCalHead')}</h2>
            <div id="cal-view"></div>
          </div>
          <div class="row mb">
            <div class="field" style="margin:0">
              <label>${t('labelFirst')}</label>
              <input class="text" id="first" placeholder="${esc(t('firstPh'))}" autocomplete="given-name"
                value="${editing && voter ? esc(voter.firstName) : ''}" ${editing ? 'readonly' : ''} />
            </div>
            <div class="field" style="margin:0">
              <label>${t('labelLast')}</label>
              <input class="text" id="last" placeholder="${esc(t('lastPh'))}" autocomplete="family-name"
                value="${editing && voter ? esc(voter.lastName) : ''}" ${editing ? 'readonly' : ''} />
            </div>
          </div>
          <button class="btn" id="submit">${t('submitBtn')}</button>
          <div class="err" id="err"></div>`;

      app.innerHTML = `
        <div class="card">
          <h1>${esc(state.event.title)}</h1>
          ${state.event.description ? `<p class="desc">${esc(state.event.description)}</p>` : ''}
          ${deadlineLine}

          ${voteSection}

          <hr class="divider" />
          ${justVoted ? `<div class="voted-confirm">${t('justVoted')}</div>` : ''}
          ${results.html}
        </div>`;

      if (isClosed) {
        // no form to wire
      } else if ((alreadyVoted || justVoted) && !editing) {
        document.getElementById('change-vote-btn')?.addEventListener('click', () => {
          renderPage(false, false, true);
        });
      } else {
        document.getElementById('submit').addEventListener('click', submitVote);
        renderCalView();
      }
      wireResults(results.hiddenCount);
    }

    async function submitVote() {
      const first = document.getElementById('first').value.trim();
      const last = document.getElementById('last').value.trim();
      const err = document.getElementById('err');
      err.textContent = '';
      if (!first || !last) { err.textContent = t('errNames'); return; }
      if (state.selected.size === 0) { err.textContent = t('errPickDay'); return; }

      const btn = document.getElementById('submit');
      btn.disabled = true; btn.textContent = t('submitting');
      const method = editingVote ? 'PUT' : 'POST';
      try {
        const r = await fetch(`${API}/votes`, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id: state.event.id,
            first_name: first,
            last_name: last,
            date_ids: [...state.selected],
          }),
        });
        if (r.status === 409) {
          markVoted(state.event.code);
          const fresh = await (await fetch(`${API}/events/by-code/${state.event.code}`)).json();
          state.tallies = fresh.tallies; state.votes = fresh.votes; state.dates = fresh.dates;
          renderPage(false, true);
          return;
        }
        if (!r.ok) throw new Error();
        markVoted(state.event.code);
        saveVoter(state.event.code, first, last, [...state.selected]);
        const fresh = await (await fetch(`${API}/events/by-code/${state.event.code}`)).json();
        state.tallies = fresh.tallies; state.votes = fresh.votes; state.dates = fresh.dates;
        state.selected = new Set();
        if (editingVote) {
          toast(t('toastUpdated'));
          renderPage(false, true);
        } else {
          renderPage(true);
        }
      } catch {
        err.textContent = t('errSubmit');
        btn.disabled = false; btn.textContent = t('submitBtn');
      }
    }

    /* ================================================================
       Manage (admin) view
    ================================================================ */
    function renderManage(data) {
      currentView = 'manage';
      changeBtn.classList.remove('hidden');
      state.event = data.event;
      state.dates = data.dates;
      state.tallies = data.tallies;
      state.votes = data.votes;
      state.selected = new Set();
      adminCode = data.event.admin_code;

      const results = buildResultsHTML();

      app.innerHTML = `
        <div class="card">
          <h2 class="mb">${t('manageHead')}</h2>
          <div class="code-box">
            <div class="lbl">${t('voteCodeLbl')}</div>
            <div class="code">${esc(state.event.code)}</div>
            <button class="btn sm" id="copy-code">${t('copyVoteBtn')}</button>
          </div>
          <div class="field mt">
            <label>${t('labelTitle')}</label>
            <input class="text" id="title" value="${esc(state.event.title)}" />
          </div>
          <div class="field">
            <label>${t('labelDescM')}</label>
            <textarea id="description">${esc(state.event.description)}</textarea>
          </div>
          <div class="field">
            <label>${t('labelDatesM')}</label>
            <div class="cal" id="picker-cal"></div>
          </div>
          <div class="field">
            <label>${t('labelClosesAt')}</label>
            <div class="preset-row" id="close-presets">
              <button class="preset-btn" data-days="7">1w</button>
              <button class="preset-btn" data-days="14">2w</button>
              <button class="preset-btn" data-days="30">1m</button>
              <button class="preset-btn" data-days="90">3m</button>
            </div>
          </div>
          <div class="edit-actions">
            <button class="btn" id="save">${t('saveBtn')}</button>
            <button class="btn danger" id="delete">${t('deleteBtn')}</button>
          </div>
          <div class="err" id="err"></div>
          <hr class="divider" />
          ${results.html}
        </div>`;

      initPicker(state.dates.map(d => d.date));
      renderPicker();
      wireTextareas(app);
      document.getElementById('copy-code').addEventListener('click', () => copyToClipboard(state.event.code));

      // Pre-select the closest deadline preset (or no-deadline if none)
      let managedCloseDays = 7;
      {
        const presetBtns = document.querySelectorAll('#close-presets .preset-btn');
        const existingCloses = state.event.closes_at ? new Date(state.event.closes_at) : null;
        if (existingCloses) {
          const daysLeft = Math.round((existingCloses - new Date()) / 864e5);
          const closest = [7, 14, 30, 90].find(d => daysLeft <= d) || 90;
          managedCloseDays = closest;
        }
        presetBtns.forEach(b => {
          if (Number(b.dataset.days) === managedCloseDays) b.classList.add('active');
        });
        document.getElementById('close-presets').addEventListener('click', e => {
          const btn = e.target.closest('.preset-btn');
          if (!btn) return;
          presetBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          managedCloseDays = Number(btn.dataset.days);
        });
      }

      document.getElementById('save').addEventListener('click', () => saveManage(managedCloseDays));
      document.getElementById('delete').addEventListener('click', deleteManage);
      wireResults(results.hiddenCount);
    }

    function adminHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminCode };
    }

    async function saveManage(closeDays = 0) {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const dates = [...picker.selected].sort();
      const err = document.getElementById('err');
      err.textContent = '';
      if (!title) { err.textContent = t('errTitleM'); return; }
      if (dates.length === 0) { err.textContent = t('errDatesM'); return; }

      const closes_at = closeDays > 0
        ? new Date(Date.now() + closeDays * 864e5).toISOString()
        : '';

      const btn = document.getElementById('save');
      btn.disabled = true; btn.textContent = t('saving');
      try {
        const r = await fetch(`${API}/events/${state.event.id}`, {
          method: 'PATCH',
          headers: adminHeaders(),
          body: JSON.stringify({ title, description, dates, closes_at }),
        });
        if (r.status === 401) { err.textContent = t('errAuth'); btn.disabled = false; btn.textContent = t('saveBtn'); return; }
        if (!r.ok) throw new Error();
        toast(t('toastSaved'));
        const fresh = await (await fetch(`${API}/events/resolve/${adminCode}`)).json();
        renderManage(fresh);
      } catch {
        err.textContent = t('errSave');
        btn.disabled = false; btn.textContent = t('saveBtn');
      }
    }

    function deleteManage() {
      showConfirm(t('confirmDel'), async () => {
        try {
          const r = await fetch(`${API}/events/${state.event.id}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + adminCode },
          });
          if (r.status === 401) { toast(t('toastNoAuth')); return; }
          if (r.status === 403) { toast(t('cannotDeleteDemo')); return; }
          if (!r.ok) throw new Error();
          toast(t('toastDeleted'));
          location.hash = '';
          renderLanding();
        } catch { toast(t('toastNoDel')); }
      });
    }

    /* ================================================================
       Router
    ================================================================ */
    async function route() {
      const raw = location.hash.replace('#', '').trim();
      if (raw.toLowerCase() === 'new') { renderCreate(); return; }
      const code = raw.toUpperCase();
      if (code && /^[A-Z0-9]{4}$/.test(code)) {
        try {
          const r = await fetch(`${API}/events/resolve/${code}`);
          if (r.ok) {
            const data = await r.json();
            if (data.mode === 'admin') renderManage(data);
            else loadEvent(data);
            return;
          }
        } catch {}
      }
      renderLanding();
    }

    window.addEventListener('hashchange', route);
    route();
  </script>
</body>
