<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DateFight · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #13141A;
      --bg-card: #1a1b22;
      --bg-elev: #20212a;
      --text: #F0EEE8;
      --muted: #8b8d98;
      --accent: #C9A84C;
      --accent-soft: rgba(201, 168, 76, 0.12);
      --border: #2a2b33;
      --red: #ff6b6b;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
    .topbar { position: relative; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 0; }
    .brand img { height: 150px; width: auto; display: block; }
    #logout { position: absolute; right: 0; bottom: 30px; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; margin-bottom: 24px;
    }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .muted { color: var(--muted); }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    input.text, textarea {
      width: 100%; background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 12px 14px;
      font-size: 15px; font-family: inherit; transition: border-color .15s, box-shadow .15s;
    }
    textarea { resize: vertical; min-height: 70px; }
    input.text:focus, textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }

    .field { margin-bottom: 18px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 12px 18px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: filter .15s, transform .05s;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }
    .btn.full { width: 100%; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn.danger { background: transparent; border: 1px solid var(--border); color: var(--red); padding: 8px 12px; font-size: 13px; }
    .btn.danger:hover { background: rgba(255,107,107,0.1); }
    .btn.sm { padding: 8px 12px; font-size: 13px; }

    /* Calendar date picker */
    .cal {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; user-select: none;
      touch-action: none;
    }
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title { font-weight: 700; font-size: 15px; }
    .cal-nav {
      width: 34px; height: 34px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text); border-radius: 9px;
      cursor: pointer; font-size: 16px; display: grid; place-items: center;
    }
    .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow {
      text-align: center; font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .04em; padding-bottom: 4px;
    }
    .cal-day {
      aspect-ratio: 1 / 1; display: grid; place-items: center;
      border-radius: 9px; font-size: 14px; cursor: pointer;
      border: 1px solid transparent;
      transition: background .1s, border-color .1s, color .1s;
    }
    .cal-day:hover { background: var(--accent-soft); }
    .cal-day.muted-day { color: #4a4b55; cursor: default; }
    .cal-day.muted-day:hover { background: transparent; }
    .cal-day.today { border-color: var(--border); }
    .cal-day.selected {
      background: var(--accent); color: #fff; font-weight: 700;
      border-color: var(--accent);
    }
    .cal-day.selected:hover { background: var(--accent); }
    .cal-hint { font-size: 12px; color: var(--muted); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .cal-hint .link-btn {
      background: none; border: none; color: var(--accent); cursor: pointer;
      font-family: inherit; font-size: 12px; padding: 0;
    }

    .err { color: var(--red); font-size: 14px; margin-top: 12px; min-height: 18px; }

    /* Code box */
    .code-box {
      background: var(--accent-soft); border: 1px solid var(--accent);
      border-radius: 12px; padding: 24px; text-align: center; margin-top: 8px;
    }
    .code-box .lbl { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .code-box .code {
      font-family: 'SFMono-Regular', ui-monospace, Menlo, monospace;
      font-size: 38px; font-weight: 700; letter-spacing: 0.22em;
      margin: 10px 0 16px; color: var(--text);
    }

    /* Event list */
    .event {
      border: 1px solid var(--border); border-radius: 12px;
      padding: 18px; margin-bottom: 14px; background: var(--bg-elev);
    }
    .event-head { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
    .event-title { font-weight: 700; font-size: 16px; }
    .event-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .event-code {
      font-family: ui-monospace, Menlo, monospace; font-weight: 700;
      color: var(--accent); letter-spacing: .1em;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .chip {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: var(--bg-card); border: 1px solid var(--border); color: var(--muted);
    }
    .pill {
      display: inline-block; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--muted);
    }
    .edit-panel {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    }
    .edit-actions { display: flex; gap: 8px; margin-top: 12px; }
    .hidden { display: none !important; }
    .center { text-align: center; }
    .mt { margin-top: 20px; }
    .login-wrap { max-width: 380px; margin: 60px auto 0; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-elev); border: 1px solid var(--accent); color: var(--text);
      padding: 12px 20px; border-radius: 10px; font-size: 14px;
      opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 50;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="brand"><img src="/img/image.png" alt="DateFight" /></div>
      </div>
      <button class="btn ghost sm hidden" id="logout">Logga ut</button>
    </div>
    <div id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API = '/api';
    const app = document.getElementById('app');
    const logoutBtn = document.getElementById('logout');
    const TOKEN_KEY = 'samdag_admin_token';

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }

    function authHeaders() { return { 'Authorization': 'Bearer ' + getToken() }; }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    const MONTHS = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
    const DOW = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
    function fmtDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d)) return iso;
      return `${DOW[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
    }

    /* ---------------- Login ---------------- */
    function renderLogin() {
      logoutBtn.classList.add('hidden');
      app.innerHTML = `
        <div class="card login-wrap">
          <h2>Logga in</h2>
          <div class="field">
            <label>Lösenord</label>
            <input class="text" type="password" id="pw" placeholder="••••••••" />
          </div>
          <button class="btn full" id="login">Logga in</button>
          <div class="err" id="err"></div>
        </div>`;
      const pw = document.getElementById('pw');
      pw.focus();
      pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
      document.getElementById('login').addEventListener('click', doLogin);

      async function doLogin() {
        const password = pw.value;
        const err = document.getElementById('err');
        err.textContent = '';
        try {
          const r = await fetch(`${API}/auth/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          const data = await r.json();
          if (data.valid) { setToken(password); renderDashboard(); }
          else err.textContent = 'Fel lösenord.';
        } catch { err.textContent = 'Kunde inte nå servern.'; }
      }
    }

    /* ---------------- Dashboard ---------------- */
    function renderDashboard() {
      logoutBtn.classList.remove('hidden');
      app.innerHTML = `
        <div class="card">
          <h2>Skapa nytt event</h2>
          <div class="field">
            <label>Titel</label>
            <input class="text" id="title" placeholder="Födelsedagsmiddag hos Anna" />
          </div>
          <div class="field">
            <label>Beskrivning</label>
            <textarea id="description" placeholder="Lite info till gästerna…"></textarea>
          </div>
          <div class="field">
            <label>Föreslagna datum</label>
            <div class="cal" id="cal"></div>
          </div>
          <button class="btn full mt" id="create">Skapa event</button>
          <div class="err" id="err"></div>
          <div id="created"></div>
        </div>
        <div class="card">
          <h2>Alla events</h2>
          <div id="events"><p class="muted">Laddar…</p></div>
        </div>`;

      document.getElementById('create').addEventListener('click', createEvent);
      initCalendar();
      loadEvents();
    }

    /* ---------------- Calendar picker (drag to select) ---------------- */
    const cal = {
      view: new Date(),          // month being shown
      selected: new Set(),       // 'YYYY-MM-DD'
      dragging: false,
      mode: 'add',               // 'add' | 'remove' based on the first cell hit
    };

    function ymd(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function initCalendar() {
      cal.view = new Date();
      cal.view.setDate(1);
      cal.selected = new Set();
      cal.dragging = false;
      renderCalendar();

      // End any drag when the pointer is released anywhere.
      document.addEventListener('pointerup', () => { cal.dragging = false; });
    }

    function applyCell(el) {
      if (!el || !el.dataset.date) return;
      const date = el.dataset.date;
      if (cal.mode === 'add') { cal.selected.add(date); el.classList.add('selected'); }
      else { cal.selected.delete(date); el.classList.remove('selected'); }
    }

    function renderCalendar() {
      const el = document.getElementById('cal');
      if (!el) return;
      const view = cal.view;
      const year = view.getFullYear(), month = view.getMonth();
      const monthName = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'][month];
      const todayStr = ymd(new Date());

      const first = new Date(year, month, 1);
      const startOffset = (first.getDay() + 6) % 7;   // Monday-first
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let cells = '';
      const dows = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
      cells += dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
      for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day muted-day"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const cls = ['cal-day'];
        if (cal.selected.has(ds)) cls.push('selected');
        if (ds === todayStr) cls.push('today');
        cells += `<div class="${cls.join(' ')}" data-date="${ds}">${day}</div>`;
      }

      el.innerHTML = `
        <div class="cal-head">
          <button class="cal-nav" data-nav="-1" type="button">‹</button>
          <div class="cal-title">${monthName} ${year}</div>
          <button class="cal-nav" data-nav="1" type="button">›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-hint">
          <span id="cal-count">${cal.selected.size} datum valda</span>
          <button class="link-btn" id="cal-clear" type="button">Rensa</button>
        </div>`;

      el.querySelectorAll('[data-nav]').forEach(btn =>
        btn.addEventListener('click', () => {
          cal.view = new Date(year, month + Number(btn.dataset.nav), 1);
          renderCalendar();
        }));

      el.querySelector('#cal-clear').addEventListener('click', () => {
        cal.selected.clear();
        renderCalendar();
      });

      const grid = el.querySelector('.cal-grid');
      grid.addEventListener('pointerdown', e => {
        const cell = e.target.closest('.cal-day');
        if (!cell || !cell.dataset.date) return;
        e.preventDefault();
        cal.dragging = true;
        cal.mode = cal.selected.has(cell.dataset.date) ? 'remove' : 'add';
        applyCell(cell);
        updateCount();
      });
      grid.addEventListener('pointermove', e => {
        if (!cal.dragging) return;
        const cell = document.elementFromPoint(e.clientX, e.clientY);
        const day = cell && cell.closest ? cell.closest('.cal-day') : null;
        if (day && day.dataset.date) { applyCell(day); updateCount(); }
      });
    }

    function updateCount() {
      const c = document.getElementById('cal-count');
      if (c) c.textContent = `${cal.selected.size} datum valda`;
    }

    /* ---------------- Edit calendar (separate state) ---------------- */
    const editCal = { view: new Date(), selected: new Set(), dragging: false, mode: 'add' };
    let activeEditId = null;

    document.addEventListener('pointerup', () => { editCal.dragging = false; });

    function openEditPanel(eventId, existingDates) {
      if (activeEditId && activeEditId !== eventId) {
        const prev = document.getElementById(`edit-panel-${activeEditId}`);
        if (prev) prev.classList.add('hidden');
      }
      activeEditId = eventId;
      editCal.selected = new Set(existingDates);
      editCal.dragging = false;
      const firstDate = [...existingDates].sort()[0];
      if (firstDate) {
        const d = new Date(firstDate + 'T00:00:00');
        editCal.view = new Date(d.getFullYear(), d.getMonth(), 1);
      } else {
        editCal.view = new Date(); editCal.view.setDate(1);
      }
      const panel = document.getElementById(`edit-panel-${eventId}`);
      panel.classList.remove('hidden');
      renderEditCalendar(eventId);
    }

    function renderEditCalendar(eventId) {
      const el = document.getElementById(`edit-cal-${eventId}`);
      if (!el) return;
      const view = editCal.view;
      const year = view.getFullYear(), month = view.getMonth();
      const monthName = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'][month];
      const todayStr = ymd(new Date());
      const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let cells = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'].map(d => `<div class="cal-dow">${d}</div>`).join('');
      for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day muted-day"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const cls = ['cal-day'];
        if (editCal.selected.has(ds)) cls.push('selected');
        if (ds === todayStr) cls.push('today');
        cells += `<div class="${cls.join(' ')}" data-date="${ds}">${day}</div>`;
      }

      el.innerHTML = `
        <div class="cal-head">
          <button class="cal-nav" data-nav="-1" type="button">‹</button>
          <div class="cal-title">${monthName} ${year}</div>
          <button class="cal-nav" data-nav="1" type="button">›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-hint">
          <span id="ecnt-${eventId}">${editCal.selected.size} datum valda</span>
          <button class="link-btn" id="eclr-${eventId}" type="button">Rensa</button>
        </div>`;

      el.querySelectorAll('[data-nav]').forEach(btn =>
        btn.addEventListener('click', () => {
          editCal.view = new Date(year, month + Number(btn.dataset.nav), 1);
          renderEditCalendar(eventId);
        }));
      el.querySelector(`#eclr-${eventId}`).addEventListener('click', () => {
        editCal.selected.clear(); renderEditCalendar(eventId);
      });

      const grid = el.querySelector('.cal-grid');
      grid.addEventListener('pointerdown', e => {
        const cell = e.target.closest('.cal-day');
        if (!cell || !cell.dataset.date) return;
        e.preventDefault();
        editCal.dragging = true;
        editCal.mode = editCal.selected.has(cell.dataset.date) ? 'remove' : 'add';
        applyEditCell(cell, eventId);
      });
      grid.addEventListener('pointermove', e => {
        if (!editCal.dragging) return;
        const cell = document.elementFromPoint(e.clientX, e.clientY);
        const day = cell && cell.closest ? cell.closest('.cal-day') : null;
        if (day && day.dataset.date) applyEditCell(day, eventId);
      });
    }

    function applyEditCell(el, eventId) {
      if (!el || !el.dataset.date) return;
      const date = el.dataset.date;
      if (editCal.mode === 'add') { editCal.selected.add(date); el.classList.add('selected'); }
      else { editCal.selected.delete(date); el.classList.remove('selected'); }
      const c = document.getElementById(`ecnt-${eventId}`);
      if (c) c.textContent = `${editCal.selected.size} datum valda`;
    }

    async function saveEventDates(id) {
      const dates = [...editCal.selected].sort();
      if (dates.length === 0) { toast('Välj minst ett datum'); return; }
      try {
        const r = await fetch(`${API}/events/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ dates }),
        });
        if (r.status === 401) { clearToken(); renderLogin(); return; }
        if (!r.ok) throw new Error();
        toast('Datum sparade ✓');
        activeEditId = null;
        loadEvents();
      } catch { toast('Kunde inte spara'); }
    }

    async function createEvent() {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const dates = [...cal.selected].sort();
      const err = document.getElementById('err');
      err.textContent = '';
      if (!title) { err.textContent = 'Titel krävs.'; return; }
      if (dates.length === 0) { err.textContent = 'Välj minst ett datum i kalendern.'; return; }

      try {
        const r = await fetch(`${API}/events`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ title, description, dates }),
        });
        if (r.status === 401) { clearToken(); renderLogin(); return; }
        if (!r.ok) throw new Error();
        const data = await r.json();
        showCreated(data.code);
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        cal.selected.clear();
        renderCalendar();
        loadEvents();
      } catch { err.textContent = 'Kunde inte skapa eventet.'; }
    }

    function showCreated(code) {
      const el = document.getElementById('created');
      el.innerHTML = `
        <div class="code-box">
          <div class="lbl">Event skapat — dela koden</div>
          <div class="code">${esc(code)}</div>
          <button class="btn sm" id="copy">📋 Kopiera kod</button>
        </div>`;
      document.getElementById('copy').addEventListener('click', () => {
        navigator.clipboard.writeText(code).then(() => toast('Kod kopierad!'));
      });
    }

    async function loadEvents() {
      const wrap = document.getElementById('events');
      try {
        const r = await fetch(`${API}/events`, { headers: authHeaders() });
        if (r.status === 401) { clearToken(); renderLogin(); return; }
        const events = await r.json();
        if (!events.length) { wrap.innerHTML = '<p class="muted">Inga events än.</p>'; return; }
        wrap.innerHTML = events.map(e => {
          const existingDates = JSON.stringify(e.dates.map(d => d.date));
          return `
          <div class="event" id="event-${e.id}">
            <div class="event-head">
              <div>
                <div class="event-title">${esc(e.title)}</div>
                <div class="event-meta">
                  Kod <span class="event-code">${esc(e.code)}</span>
                  · <span class="pill">${e.vote_count} röster</span>
                </div>
              </div>
              <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
                <button class="btn ghost sm" data-edit="${e.id}" data-dates='${esc(existingDates)}'>Redigera</button>
                <button class="btn danger" data-del="${e.id}">Ta bort</button>
              </div>
            </div>
            <div class="chips">
              ${e.dates.map(d => `<span class="chip">${fmtDate(d.date)}</span>`).join('') || '<span class="muted">Inga datum</span>'}
            </div>
            <div class="edit-panel hidden" id="edit-panel-${e.id}">
              <div class="cal" id="edit-cal-${e.id}"></div>
              <div class="edit-actions">
                <button class="btn sm" data-save="${e.id}">Spara datum</button>
                <button class="btn ghost sm" data-cancel="${e.id}">Avbryt</button>
              </div>
            </div>
          </div>`;
        }).join('');

        wrap.querySelectorAll('[data-edit]').forEach(btn => {
          btn.addEventListener('click', () => {
            const dates = JSON.parse(btn.dataset.dates);
            openEditPanel(btn.dataset.edit, dates);
          });
        });
        wrap.querySelectorAll('[data-save]').forEach(btn => {
          btn.addEventListener('click', () => saveEventDates(btn.dataset.save));
        });
        wrap.querySelectorAll('[data-cancel]').forEach(btn => {
          btn.addEventListener('click', () => {
            document.getElementById(`edit-panel-${btn.dataset.cancel}`).classList.add('hidden');
            activeEditId = null;
          });
        });
        wrap.querySelectorAll('[data-del]').forEach(btn => {
          btn.addEventListener('click', () => deleteEvent(btn.dataset.del));
        });
      } catch { wrap.innerHTML = '<p class="err">Kunde inte ladda events.</p>'; }
    }

    async function deleteEvent(id) {
      if (!confirm('Ta bort eventet och alla röster?')) return;
      try {
        const r = await fetch(`${API}/events/${id}`, {
          method: 'DELETE', headers: authHeaders(),
        });
        if (r.status === 401) { clearToken(); renderLogin(); return; }
        if (!r.ok) throw new Error();
        toast('Event borttaget');
        loadEvents();
      } catch { toast('Kunde inte ta bort'); }
    }

    logoutBtn.addEventListener('click', () => { clearToken(); renderLogin(); });

    /* ---------------- Boot ---------------- */
    (async function boot() {
      if (!getToken()) { renderLogin(); return; }
      const r = await fetch(`${API}/auth/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: getToken() }),
      }).catch(() => null);
      if (r && (await r.json()).valid) renderDashboard();
      else { clearToken(); renderLogin(); }
    })();
  </script>
</body>
</html>
