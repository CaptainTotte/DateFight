services:
  api:
    build: ./backend
    environment:
      DB_PATH: /data/samdag.db
      DEMO_EVENT_CODE: ${DEMO_EVENT_CODE:-}
      DEMO_ADMIN_CODE: ${DEMO_ADMIN_CODE:-}
    volumes:
      - db-data:/data
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
